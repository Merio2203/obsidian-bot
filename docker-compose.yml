services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    volumes:
      - ./vault:/app/vault
      - ./data:/app/data
      - ~/.config/rclone:/root/.config/rclone:ro
      - ./data/google_token.json:/app/data/google_token.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./vault:/app/vault
      - ./data:/app/data
      - ~/.config/rclone:/root/.config/rclone:ro
      - ./data/google_token.json:/app/data/google_token.json
    ports:
      - "8000:8000"

  web:
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
