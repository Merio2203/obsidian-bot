version: "3.8"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./vault:/app/vault
      - ./data:/app/data
      - ~/.config/rclone:/root/.config/rclone:ro
      - ./data/google_token.json:/app/data/google_token.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
